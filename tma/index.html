<!DOCTYPE html>
<html lang="es" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>aBOTgado — Asistente Jurídico Venezolano</title>
  <style>
    /* ─── TOKENS DE TEMA ─────────────────────────────────────────── */
    :root {
      /* Light */
      --bg:          #f0f4f9;
      --surface:     #ffffff;
      --surface2:    #e8eef5;
      --border:      #d8e2ed;
      --accent:      #1a4a8a;
      --accent-h:    #143a6e;
      --accent-soft: #e3ecfb;
      --text:        #111827;
      --text2:       #6b7a8d;
      --bubble-u:    #1a4a8a;
      --bubble-b:    #ffffff;
      --txt-u:       #ffffff;
      --txt-b:       #111827;
      --shadow:      rgba(0,0,0,.08);
      --chip-bg:     #e3ecfb;
      --chip-txt:    #1a4a8a;
      --badge-bg:    #e3ecfb;
      --badge-txt:   #1a4a8a;
      --input-bg:    #ffffff;
      --header-bg:   #ffffff;
      --scrollbar:   #c8d5e3;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0d1117;
        --surface:     #161b27;
        --surface2:    #1c2336;
        --border:      #252f42;
        --accent:      #2563eb;
        --accent-h:    #1d4ed8;
        --accent-soft: #172344;
        --text:        #e2e8f0;
        --text2:       #7a8fa8;
        --bubble-u:    #1e3a6e;
        --bubble-b:    #1c2336;
        --txt-u:       #e2e8f0;
        --txt-b:       #e2e8f0;
        --shadow:      rgba(0,0,0,.35);
        --chip-bg:     #1c2a42;
        --chip-txt:    #7db3f5;
        --badge-bg:    #172344;
        --badge-txt:   #7db3f5;
        --input-bg:    #161b27;
        --header-bg:   #0f1520;
        --scrollbar:   #2a3550;
      }
    }

    /* Override manual si el usuario cambió el toggle */
    [data-theme="light"] { --bg:#f0f4f9; --surface:#ffffff; --surface2:#e8eef5; --border:#d8e2ed; --accent:#1a4a8a; --accent-h:#143a6e; --accent-soft:#e3ecfb; --text:#111827; --text2:#6b7a8d; --bubble-u:#1a4a8a; --bubble-b:#ffffff; --txt-u:#ffffff; --txt-b:#111827; --shadow:rgba(0,0,0,.08); --chip-bg:#e3ecfb; --chip-txt:#1a4a8a; --badge-bg:#e3ecfb; --badge-txt:#1a4a8a; --input-bg:#ffffff; --header-bg:#ffffff; --scrollbar:#c8d5e3; }
    [data-theme="dark"]  { --bg:#0d1117; --surface:#161b27; --surface2:#1c2336; --border:#252f42; --accent:#2563eb; --accent-h:#1d4ed8; --accent-soft:#172344; --text:#e2e8f0; --text2:#7a8fa8; --bubble-u:#1e3a6e; --bubble-b:#1c2336; --txt-u:#e2e8f0; --txt-b:#e2e8f0; --shadow:rgba(0,0,0,.35); --chip-bg:#1c2a42; --chip-txt:#7db3f5; --badge-bg:#172344; --badge-txt:#7db3f5; --input-bg:#161b27; --header-bg:#0f1520; --scrollbar:#2a3550; }

    /* ─── RESET / BASE ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .25s, color .25s;
    }

    /* ─── HEADER ─────────────────────────────────────────────────── */
    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 1px 6px var(--shadow);
      z-index: 10;
    }

    .h-left { display: flex; align-items: center; gap: 10px; }

    .logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .h-title { font-size: 15px; font-weight: 700; }
    .h-sub   { font-size: 11px; color: var(--text2); margin-top: 1px; }

    .h-actions { display: flex; gap: 6px; }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 14px;
      transition: all .2s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }

    /* ─── CHAT ───────────────────────────────────────────────────── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* ─── BIENVENIDA + CHIPS ─────────────────────────────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 14px;
      padding: 20px;
      animation: fadeIn .3s ease;
    }

    .wlc-logo {
      width: 68px; height: 68px;
      background: var(--accent);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
    }

    .wlc-title { font-size: 22px; font-weight: 700; }
    .wlc-sub   { font-size: 14px; color: var(--text2); max-width: 300px; line-height: 1.5; }

    .chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 460px;
      margin-top: 6px;
    }

    .chip {
      background: var(--chip-bg);
      color: var(--chip-txt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 13px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all .2s;
      line-height: 1.4;
    }
    .chip:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-1px); }

    /* ─── BURBUJAS ───────────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 9px;
      max-width: 82%;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .av {
      width: 30px; height: 30px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .av.b { background: var(--accent); }
    .av.u { background: #374151; color: #e2e8f0; }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
    }
    .msg.user .bubble {
      background: var(--bubble-u);
      color: var(--txt-u);
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: var(--bubble-b);
      color: var(--txt-b);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ─── Contenido HTML del bot ────────────────────────────────── */
    .msg.bot .bubble b    { font-weight: 600; }
    .msg.bot .bubble i    { font-style: italic; color: var(--text2); font-size: 13px; }
    .msg.bot .bubble code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      background: var(--surface2);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 5px;
    }

    /* Secciones separadas por doble salto */
    .msg.bot .bubble .seccion {
      display: block;
      margin-top: 10px;
    }
    .msg.bot .bubble .seccion:first-child { margin-top: 0; }

    /* Líneas de artículos citados */
    .msg.bot .bubble .articulo {
      display: block;
      margin: 6px 0 6px 10px;
      padding-left: 10px;
      border-left: 2px solid var(--accent);
      font-size: 13px;
      line-height: 1.55;
    }

    /* Pasos numerados */
    .msg.bot .bubble .paso {
      display: flex;
      gap: 8px;
      margin: 5px 0;
      font-size: 13.5px;
      line-height: 1.5;
    }
    .msg.bot .bubble .paso .num {
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }

    /* Disclaimer ⚠️ */
    .msg.bot .bubble .disclaimer {
      display: block;
      margin-top: 10px;
      font-size: 12px;
      color: var(--text2);
      font-style: italic;
    }

    /* ─── META (badge + acciones) ────────────────────────────────── */
    .meta {
      display: flex; align-items: center; gap: 7px;
      margin-top: 5px; padding-left: 39px;
      flex-wrap: wrap;
    }
    .msg.user .meta { justify-content: flex-end; padding-left: 0; padding-right: 39px; }

    .badge {
      background: var(--badge-bg);
      color: var(--badge-txt);
      font-size: 11px; padding: 2px 8px;
      border-radius: 20px; font-weight: 600;
      letter-spacing: .2px;
    }

    .actions { display: flex; gap: 4px; }

    .btn-a {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 7px;
      padding: 3px 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      line-height: 1;
    }
    .btn-a:hover                { background: var(--surface2); }
    .btn-a.up   { color: #22c55e; border-color: #22c55e; background: #f0fdf4; }
    .btn-a.down { color: #ef4444; border-color: #ef4444; background: #fef2f2; }
    [data-theme="dark"] .btn-a.up   { background: #14532d; }
    [data-theme="dark"] .btn-a.down { background: #450a0a; }

    .btn-copy-done { color: #22c55e !important; }

    /* ─── TYPING ─────────────────────────────────────────────────── */
    #typing {
      display: none;
      gap: 9px;
      align-self: flex-start;
      align-items: flex-end;
    }
    #typing.show { display: flex; animation: fadeIn .2s ease; }

    .t-bubble {
      background: var(--bubble-b);
      border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 13px 16px;
      display: flex; gap: 5px; align-items: center;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--text2);
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* ─── INPUT ──────────────────────────────────────────────────── */
    .input-wrap {
      background: var(--header-bg);
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      flex-shrink: 0;
      position: relative;
    }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    textarea {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 110px;
      min-height: 44px;
      transition: border-color .2s;
      line-height: 1.5;
      scrollbar-width: thin;
    }
    textarea:focus  { border-color: var(--accent); }
    textarea::placeholder { color: var(--text2); }

    .btn-send {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none; border-radius: 12px;
      color: #fff; font-size: 19px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    .btn-send:hover    { background: var(--accent-h); }
    .btn-send:active   { transform: scale(.95); }
    .btn-send:disabled { opacity: .45; cursor: not-allowed; }

    .input-hint {
      font-size: 11px; color: var(--text2);
      text-align: center; margin-top: 6px;
    }

    /* ─── PANEL COMANDOS ─────────────────────────────────────────── */
    #cmd-panel {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 14px; right: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 -6px 24px var(--shadow);
      max-height: 250px;
      overflow-y: auto;
      display: none;
      z-index: 20;
    }
    #cmd-panel.open { display: block; animation: fadeIn .15s ease; }

    .cmd-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .cmd-row:last-child { border-bottom: none; }
    .cmd-row:hover, .cmd-row.sel { background: var(--surface2); }

    .cmd-name {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px; color: var(--accent);
      font-weight: 700; min-width: 140px;
    }
    .cmd-desc { font-size: 13px; color: var(--text2); flex: 1; }

    .plan-tag {
      font-size: 10px; padding: 2px 6px;
      border-radius: 20px; font-weight: 700;
      flex-shrink: 0;
    }
    .plan-tag.g { background:#dcfce7; color:#166534; }
    .plan-tag.p { background:#fef3c7; color:#92400e; }
    .plan-tag.x { background:#ede9fe; color:#5b21b6; }
    [data-theme="dark"] .plan-tag.g { background:#14532d; color:#86efac; }
    [data-theme="dark"] .plan-tag.p { background:#451a03; color:#fcd34d; }
    [data-theme="dark"] .plan-tag.x { background:#2e1065; color:#c4b5fd; }

    /* ─── SCROLLBAR ──────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

    /* ─── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .chips { grid-template-columns: 1fr; }
      .msg   { max-width: 92%; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ══════════════════════════════════════════════════════ -->
<header>
  <div class="h-left">
    <div class="logo">⚖️</div>
    <div>
      <div class="h-title">aBOTgado</div>

  </div>
  <div class="h-actions">
    <button class="btn-icon" id="btn-nuevo" title="Nueva consulta">🗑 Nuevo</button>

  </div>
</header>

<!-- ═══ CHAT ════════════════════════════════════════════════════════ -->
<div class="chat" id="chat">

  <!-- Bienvenida -->
  <div id="welcome">
    <div class="wlc-logo">⚖️</div>
    <div class="wlc-title">¡Hola! Soy aBOTgado</div>
    <div class="wlc-sub">Tu asistente jurídico venezolano. Escribe tu consulta legal o elige una sugerencia.</div>
    <div class="chips" id="chips">
      <button class="chip" data-q="¿Qué hago si me despiden injustificadamente?">💼 Me despidieron injustificadamente</button>
      <button class="chip" data-q="Me chocaron el carro y el conductor se fue. ¿Qué hago?">🚗 Me chocaron el carro y se fue</button>
      <button class="chip" data-q="El casero quiere desalojarme sin previo aviso. ¿Es legal?">🏠 El casero quiere desalojarme</button>
      <button class="chip" data-q="Mi papá falleció y dejó bienes. ¿Cómo se hace la herencia?">📜 ¿Cómo funciona la herencia?</button>

<div class="input-wrap">
  <!-- Panel de comandos -->
  <div id="cmd-panel"></div>

  <div class="input-row">
    <textarea
      id="inp"
      rows="1"
      placeholder="Escribe tu consulta legal... (/ para comandos)"
      maxlength="2000"
    ></textarea>
    <button class="btn-send" id="btn-send" disabled>➤</button>
  </div>
  <div class="input-hint">
    ⚠️ Info orientativa · No sustituye asesoría legal · <strong>Enter</strong> enviar · <strong>Shift+Enter</strong> nueva línea
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURACIÓN
// ═══════════════════════════════════════════════════════════════════
const API = 'https://worker-production-89db.up.railway.app';

const COMANDOS = [
  // Disponibles para todos
  { cmd: '/nuevo',          desc: 'Limpiar el chat y empezar de cero',      plan: 'g', local: true  },
  { cmd: '/leyes',          desc: 'Ver las leyes disponibles en el sistema', plan: 'g', local: false },
  { cmd: '/ayuda',          desc: 'Mostrar ayuda y comandos disponibles',    plan: 'g', local: false },
  { cmd: '/estado',         desc: 'Ver tu plan y consultas restantes',       plan: 'g', local: false },
  { cmd: '/referir',        desc: 'Obtener tu enlace de referido',           plan: 'g', local: false },
  { cmd: '/soporte',        desc: 'Contactar al equipo de soporte',          plan: 'g', local: false },
  // Pionero
  { cmd: '/ley',            desc: 'Buscar un artículo específico de una ley',plan: 'p', local: false },
  { cmd: '/comparar',       desc: 'Comparar dos leyes o artículos',          plan: 'p', local: false },
  { cmd: '/guardar',        desc: 'Guardar la última respuesta recibida',     plan: 'p', local: false },
  { cmd: '/mis_consultas',  desc: 'Ver tus consultas guardadas',              plan: 'p', local: false },
  { cmd: '/stats',          desc: 'Ver tus estadísticas de uso',             plan: 'p', local: false },
  // Premium
  { cmd: '/documento',      desc: 'Generar un documento legal en PDF',       plan: 'x', local: false },
];

const PLAN_LABEL = { g: 'Gratis', p: 'Pionero', x: 'Premium' };

// ═══════════════════════════════════════════════════════════════════
// TEMA
// ═══════════════════════════════════════════════════════════════════
const root     = document.documentElement;
const btnTheme = document.getElementById('btn-theme');
let   theme    = localStorage.getItem('theme') || 'auto';

function applyTheme(t) {
  theme = t;
  localStorage.setItem('theme', t);
  if (t === 'auto') {
    root.removeAttribute('data-theme');
  } else {
    root.setAttribute('data-theme', t);
  }
  // Ícono del botón
  const isDark = t === 'dark' || (t === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
  btnTheme.textContent = isDark ? '☀️' : '🌙';
}

btnTheme.addEventListener('click', () => {
  const cycle = { auto: 'dark', dark: 'light', light: 'auto' };
  applyTheme(cycle[theme] || 'auto');
});

applyTheme(theme);
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (theme === 'auto') applyTheme('auto');
});

// ═══════════════════════════════════════════════════════════════════
// FORMATEAR RESPUESTA DEL BOT
// Convierte el HTML plano de Telegram en estructura visual para la TMA
// ═══════════════════════════════════════════════════════════════════
function formatearBurbuja(html) {
  // Separar en bloques por doble salto de línea
  const bloques = html.split(/\n\n+/);

  return bloques.map(bloque => {
    const lineas = bloque.split('\n');
    const contenido = lineas.map((linea, idx) => {

      // Disclaimer ⚠️ (línea con <i>)
      if (linea.startsWith('⚠️')) {
        return `<span class="disclaimer">${linea}</span>`;
      }

      // Línea de artículo citado: empieza con "- <b>"
      if (linea.match(/^- <b>/)) {
        return `<span class="articulo">${linea.slice(2)}</span>`;
      }

      // Paso numerado: empieza con "1. ", "2. ", etc.
      const paso = linea.match(/^(\d+)\.\s+(.+)/);
      if (paso) {
        return `<div class="paso"><span class="num">${paso[1]}</span><span>${paso[2]}</span></div>`;
      }

      // Línea normal con salto si no es la última del bloque
      return linea + (idx < lineas.length - 1 ? '<br>' : '');
    }).join('');

    return `<span class="seccion">${contenido}</span>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════════════
let historial = [];   // [{rol:'usuario'|'bot', texto:'...'}]
let enviando  = false;

// ═══════════════════════════════════════════════════════════════════
// UTILIDADES DOM
// ═══════════════════════════════════════════════════════════════════
const chat    = document.getElementById('chat');
const welcome = document.getElementById('welcome');
const typing  = document.getElementById('typing');
const inp     = document.getElementById('inp');
const btnSend = document.getElementById('btn-send');

function scrollBottom() {
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
}

function hideWelcome() {
  if (welcome && welcome.parentNode) welcome.remove();
}

function showTyping()  {
  chat.appendChild(typing);
  typing.classList.add('show');
  scrollBottom();
}

function hideTyping()  { typing.classList.remove('show'); }

// ═══════════════════════════════════════════════════════════════════
// RENDERIZAR MENSAJE
// ═══════════════════════════════════════════════════════════════════
let msgCounter = 0;

function addMessage(rol, texto, temas = [], msgId = null) {
  hideWelcome();

  const id  = msgId || `m${++msgCounter}`;
  const div = document.createElement('div');
  div.className = `msg ${rol}`;
  div.id = id;

  const isBot = rol === 'bot';

  // Avatar
  const av = document.createElement('div');
  av.className = `av ${isBot ? 'b' : 'u'}`;
  av.textContent = isBot ? '⚖️' : '👤';

  // Burbuja
  const bub = document.createElement('div');
  bub.className = 'bubble';
  if (isBot) {
    bub.innerHTML = formatearBurbuja(texto);
  } else {
    bub.textContent = texto; // texto plano del usuario (sin XSS)
  }

  div.appendChild(av);
  div.appendChild(bub);
  chat.insertBefore(div, typing);

  // Meta (solo para respuestas del bot)
  if (isBot) {
    const meta = document.createElement('div');
    meta.className = 'meta';

    // Badge de tema
    if (temas.length) {
      const badge = document.createElement('span');
      badge.className = 'badge';
      const t = temas[0].replace(/_/g, ' ');
      badge.textContent = t.charAt(0).toUpperCase() + t.slice(1);
      meta.appendChild(badge);
    }

    // Acciones: copiar + 👍 👎
    const acts = document.createElement('div');
    acts.className = 'actions';

    const btnCopy = document.createElement('button');
    btnCopy.className = 'btn-a';
    btnCopy.textContent = '📋';
    btnCopy.title = 'Copiar respuesta';
    btnCopy.addEventListener('click', () => {
      // Copiar texto plano (sin HTML)
      const tmp = document.createElement('div');
      tmp.innerHTML = texto;
      navigator.clipboard.writeText(tmp.textContent).then(() => {
        btnCopy.textContent = '✅';
        btnCopy.classList.add('btn-copy-done');
        setTimeout(() => { btnCopy.textContent = '📋'; btnCopy.classList.remove('btn-copy-done'); }, 2000);
      });
    });

    const btnUp   = document.createElement('button');
    btnUp.className = 'btn-a';
    btnUp.textContent = '👍';
    btnUp.title = 'Buena respuesta';

    const btnDown = document.createElement('button');
    btnDown.className = 'btn-a';
    btnDown.textContent = '👎';
    btnDown.title = 'Respuesta mejorable';

    btnUp.addEventListener('click', () => {
      if (btnUp.classList.contains('up')) return;
      btnUp.classList.add('up');
      btnDown.classList.remove('down');
      enviarFeedback(id, 1);
    });

    btnDown.addEventListener('click', () => {
      if (btnDown.classList.contains('down')) return;
      btnDown.classList.add('down');
      btnUp.classList.remove('up');
      enviarFeedback(id, -1);
    });

    acts.appendChild(btnCopy);
    acts.appendChild(btnUp);
    acts.appendChild(btnDown);
    meta.appendChild(acts);
    chat.insertBefore(meta, typing);
  }

  scrollBottom();
  return id;
}

// ═══════════════════════════════════════════════════════════════════
// ENVIAR CONSULTA
// ═══════════════════════════════════════════════════════════════════
async function enviar(texto) {
  texto = texto.trim();
  if (!texto || enviando) return;

  // Manejar /nuevo localmente
  if (texto.toLowerCase() === '/nuevo') {
    limpiarChat();
    return;
  }

  enviando = true;
  btnSend.disabled = true;
  inp.value = '';
  autoResize();
  cerrarCmdPanel();

  addMessage('usuario', texto);
  historial.push({ rol: 'usuario', texto });
  showTyping();

  try {
    const res = await fetch(`${API}/consultar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pregunta:  texto,
        user_id:   'tma_anonimo',
        historial: historial.slice(-10).slice(0, -1).map(m => ({
          rol:   m.rol,
          texto: m.texto,
        })),
      }),
    });

    hideTyping();

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const respuesta = data.respuesta || 'Sin respuesta.';
    addMessage('bot', respuesta, data.temas || []);
    historial.push({ rol: 'bot', texto: respuesta });

  } catch (e) {
    hideTyping();
    addMessage('bot', '⚠️ Error al conectar con el servidor. Intenta de nuevo.', []);
    console.error(e);
  }

  enviando = false;
  btnSend.disabled = false;
  inp.focus();
}

// ═══════════════════════════════════════════════════════════════════
// FEEDBACK
// ═══════════════════════════════════════════════════════════════════
async function enviarFeedback(msgId, valor) {
  try {
    await fetch(`${API}/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ msg_id: msgId, valor }),
    });
  } catch (_) { /* silencioso */ }
}

// ═══════════════════════════════════════════════════════════════════
// LIMPIAR CHAT
// ═══════════════════════════════════════════════════════════════════
function limpiarChat() {
  historial = [];
  // Eliminar todos los mensajes y metas
  [...chat.querySelectorAll('.msg, .meta')].forEach(el => el.remove());
  // Restaurar bienvenida
  chat.insertBefore(crearWelcome(), typing);
}

function crearWelcome() {
  const w = document.createElement('div');
  w.id = 'welcome';
  w.innerHTML = `
    <div class="wlc-logo">⚖️</div>
    <div class="wlc-title">¡Hola! Soy aBOTgado</div>
    <div class="wlc-sub">Tu asistente jurídico venezolano. Escribe tu consulta legal o elige una sugerencia.</div>
    <div class="chips" id="chips">
      <button class="chip" data-q="¿Qué hago si me despiden injustificadamente?">💼 Me despidieron injustificadamente</button>
      <button class="chip" data-q="Me chocaron el carro y el conductor se fue. ¿Qué hago?">🚗 Me chocaron el carro y se fue</button>
      <button class="chip" data-q="El casero quiere desalojarme sin previo aviso. ¿Es legal?">🏠 El casero quiere desalojarme</button>
      <button class="chip" data-q="Mi papá falleció y dejó bienes. ¿Cómo se hace la herencia?">📜 ¿Cómo funciona la herencia?</button>
      <button class="chip" data-q="¿Pueden revisar mi teléfono en una alcabala?">📱 ¿Pueden revisar mi teléfono?</button>
      <button class="chip" data-q="Me amenazó un vecino. ¿Qué hago?">⚠️ Me amenazó un vecino</button>
    </div>`;
  bindChips(w);
  return w;
}

function bindChips(ctx) {
  ctx.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => enviar(c.dataset.q));
  });
}

// Bind inicial
bindChips(document);
document.getElementById('btn-nuevo').addEventListener('click', limpiarChat);

// ═══════════════════════════════════════════════════════════════════
// AUTOCOMPLETAR COMANDOS
// ═══════════════════════════════════════════════════════════════════
const cmdPanel = document.getElementById('cmd-panel');
let   cmdIdx   = -1;

function renderCmdPanel(filtro) {
  const q = filtro.slice(1).toLowerCase();
  const matches = COMANDOS.filter(c => c.cmd.slice(1).startsWith(q));

  if (!matches.length) { cerrarCmdPanel(); return; }

  cmdPanel.innerHTML = '';
  cmdIdx = -1;

  matches.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'cmd-row';
    row.dataset.cmd = c.cmd;
    row.innerHTML = `
      <span class="cmd-name">${c.cmd}</span>
      <span class="cmd-desc">${c.desc}</span>
      <span class="plan-tag ${c.plan}">${PLAN_LABEL[c.plan]}</span>`;
    row.addEventListener('click', () => seleccionarCmd(c.cmd));
    cmdPanel.appendChild(row);
  });

  cmdPanel.classList.add('open');
}

function cerrarCmdPanel() { cmdPanel.classList.remove('open'); cmdIdx = -1; }

function seleccionarCmd(cmd) {
  if (cmd === '/nuevo') { cerrarCmdPanel(); inp.value = ''; limpiarChat(); return; }
  inp.value = cmd + ' ';
  cerrarCmdPanel();
  inp.focus();
  autoResize();
  btnSend.disabled = false;
}

function navegarCmds(dir) {
  const rows = [...cmdPanel.querySelectorAll('.cmd-row')];
  if (!rows.length) return;
  rows[cmdIdx]?.classList.remove('sel');
  cmdIdx = (cmdIdx + dir + rows.length) % rows.length;
  rows[cmdIdx].classList.add('sel');
}

// ═══════════════════════════════════════════════════════════════════
// INPUT: EVENTOS
// ═══════════════════════════════════════════════════════════════════
function autoResize() {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
}

inp.addEventListener('input', () => {
  autoResize();
  const val = inp.value;
  btnSend.disabled = !val.trim();

  if (val.startsWith('/')) {
    renderCmdPanel(val.split(' ')[0]);
  } else {
    cerrarCmdPanel();
  }
});

inp.addEventListener('keydown', e => {
  if (cmdPanel.classList.contains('open')) {
    if (e.key === 'ArrowDown')  { e.preventDefault(); navegarCmds(+1); return; }
    if (e.key === 'ArrowUp')    { e.preventDefault(); navegarCmds(-1); return; }
    if (e.key === 'Tab' || e.key === 'Enter') {
      const sel = cmdPanel.querySelector('.sel');
      if (sel) { e.preventDefault(); seleccionarCmd(sel.dataset.cmd); return; }
    }
    if (e.key === 'Escape') { cerrarCmdPanel(); return; }
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    enviar(inp.value);
  }
});

// Cerrar panel al hacer clic fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) cerrarCmdPanel();
});

btnSend.addEventListener('click', () => enviar(inp.value));
</script>
